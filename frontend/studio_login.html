<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOKN Studio Login</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #cde6ff;
        font-family: "Inter", sans-serif;
        text-align: center;
        overflow: hidden;
    }

    /* Particle Layer */
    #particle-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
    }
    .particle {
        position: absolute;
        bottom: -20px;
        width: 4px;
        height: 4px;
        background: rgba(45,115,255,0.9);
        opacity: 0.8;
        border-radius: 50%;
        animation: floatUp 6s linear forwards;
        filter: blur(1px);
    }
    @keyframes floatUp {
        0% { opacity: .4; transform: translateY(0); }
        50% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-120vh); }
    }

    /* Login Panel */
    .panel {
        position: relative;
        margin: 120px auto;
        width: 90%;
        max-width: 420px;

        background: rgba(10,25,55,0.35);
        backdrop-filter: blur(18px) saturate(180%);
        border-radius: 20px;

        border: 1px solid rgba(0,120,255,0.35);
        box-shadow: inset 0 0 22px rgba(0,120,255,0.25), 0 0 26px rgba(0,120,255,0.35);

        padding: 32px;
        z-index: 5;
    }

    h1 {
        color: #7ec3ff;
        text-shadow: 0 0 14px rgba(0,160,255,0.9);
        font-size: 26px;
        margin-bottom: 18px;
    }

    .tokn-input {
        width: 80%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(80,140,255,0.45);
        background: rgba(0,30,60,0.45);
        color: white;
        text-align: center;
        font-size: 20px;
        letter-spacing: 4px;
        outline: none;
        margin-bottom: 20px;
    }

    .tokn-btn {
        padding: 14px 38px;
        font-size: 18px;
        color: white;
        cursor: pointer;
        border-radius: 999px;
        border: 1px solid rgba(0,150,255,0.55);

        background: linear-gradient(135deg, rgba(0,140,255,0.8), rgba(0,255,255,0.35));
        backdrop-filter: blur(10px);

        box-shadow:
            0 0 14px rgba(0,150,255,0.45),
            inset 0 0 12px rgba(0,150,255,0.25);

        transition: 0.25s ease;
    }
    .tokn-btn:hover {
        transform: scale(1.05);
        box-shadow:
            0 0 22px rgba(0,180,255,0.85),
            inset 0 0 18px rgba(0,150,255,0.35);
    }

    .error {
        color: #ff6b6b;
        margin-top: 12px;
        min-height: 20px;
    }
</style>
</head>

<body>

<div id="particle-layer"></div>

<div class="panel">
    <h1>Enter Access Code</h1>
    <p>Open your authenticator app → enter the 6-digit code.</p>

    <input id="code" maxlength="6" class="tokn-input" placeholder="••••••" />

    <button class="tokn-btn" onclick="submitCode()">Enter Studio</button>

    <div id="error" class="error"></div>
</div>

<script>
// PARTICLES
function spawnParticle() {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random()*100 + "vw";
    p.style.width = p.style.height = (Math.random()*3+2) + "px";
    p.style.animationDuration = (Math.random()*4 + 4) + "s";
    document.getElementById("particle-layer").appendChild(p);
    setTimeout(() => p.remove(), 8000);
}
setInterval(spawnParticle, 160);

// LOGIN
function submitCode() {
    const code = document.getElementById("code").value.trim();
    if (code.length !== 6) {
        showError("Enter your 6-digit code.");
        return;
    }

    fetch("/api/studio/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ code })
    })
    .then(r => r.json())
    .then(res => {
        if (res.ok) {
            window.location.href = "/studio.html";
        } else {
            showError(res.error || "Invalid code");
        }
    })
    .catch(() => showError("Network error"));
}

function showError(msg) {
    document.getElementById("error").textContent = msg;
}
</script>

</body>
</html>
