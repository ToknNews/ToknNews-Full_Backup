<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOKN Studio Enrollment</title>

    <style>
        body {
            background: #000;
            font-family: Inter, Arial, sans-serif;
            text-align: center;
            color: #e8f4ff;
            padding-top: 50px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            text-shadow: 0 0 12px #0af;
        }

        .desc {
            font-size: 18px;
            margin-bottom: 28px;
            opacity: 0.82;
        }

        #qr {
            margin-top: 20px;
            width: 260px;
            height: 260px;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 0 25px #0af;
        }

        #loading {
            font-size: 18px;
            margin-top: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <h1>Enroll TOKN Control Studio</h1>
    <div class="desc">
        Open Google Authenticator → Add Account → Scan this QR Code
    </div>

    <img id="qr" alt="QR Code Loading…" />
    <div id="loading">Loading QR…</div>

    <script>
        fetch("/api/studio/qrcode")
            .then(r => r.json())
            .then(data => {
                document.getElementById("qr").src = data.qr;
                document.getElementById("loading").style.display = "none";
            })
            .catch(err => {
                document.getElementById("loading").innerText = "Error loading QR.";
                console.error(err);
            });
    </script>

</body>
</html>
